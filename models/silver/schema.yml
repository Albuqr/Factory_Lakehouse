version: 2

models:
  - name: silver_transactions
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - transaction_date
            - description
            - debit_brl
    columns:
      - name: transaction_date
        tests:
          - not_null
      - name: month_key
        tests:
          - not_null
      - name: cost_center
        tests:
          - not_null
          - accepted_values:
              values: ['Producao', 'RH', 'Marketing', 'Fixas', 'Receita', 'Outro']
      - name: is_incoming
        tests:
          - not_null

  - name: silver_budget
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - month_key
            - cost_center
            - line_item
    columns:
      - name: budget_year
        tests:
          - not_null
      - name: month_key
        tests:
          - not_null
      - name: month_number
        tests:
          - not_null
      - name: cost_center
        tests:
          - not_null
          - accepted_values:
              values: ['Producao', 'RH', 'Marketing', 'Fixas', 'Receita', 'Outro']
      - name: line_item
        tests:
          - not_null
      - name: budget_amount_brl
        tests:
          - not_null

  - name: silver_equipment
    columns:
      - name: item_id
        tests:
          - not_null
          - unique
      - name: equipment_name
        tests:
          - not_null
      - name: machine_type
        tests:
          - not_null
      - name: production_line
        tests:
          - not_null
          - accepted_values:
              values: ['trufa', 'pao_de_mel', 'both']
      - name: brand
      - name: model
      - name: country_of_origin
      - name: _ingested_at